services:
    user:
        image: notebookum-user:v1.0.0
        restart: unless-stopped
        deploy:
            replicas: 2
        networks:
            notebookum-network:
                aliases:
                    - users.universidad.localhost
        environment:
            - HOST=0.0.0.0
            - PORT=5000
            - DEBUG=False
            - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-super-secret-key-change-in-production}
            - JWT_ALGORITHM=HS256
            - JWT_EXPIRE_MINUTES=30
            - PERSISTENCE_SERVICE_URL=http://persistence-java.universidad.localhost:8080
            - REQUEST_TIMEOUT=30
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=${REDIS_PASSWORD:-}
            - LOG_LEVEL=INFO
            # Consul Service Discovery
            - CONSUL_HOST=consul
            - CONSUL_PORT=8500

networks:
    notebookum-network:
        external: true
